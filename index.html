<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLOPDER WEB</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-terror"></div>
    
    <!-- PÁGINA 1: SLOPDER WEB -->
    <div id="page1" class="container">
        <h1 class="title-horror">SLOPDER WEB</h1>
        
        <div class="form-container">
            <div class="input-group">
                <input 
                    type="text" 
                    id="emailInput" 
                    class="email-input" 
                    placeholder="Email"
                    maxlength="100"
                >
            </div>
            
            <button id="enterButton" class="enter-button" style="display: none;">
                ENTRAR AHORA
            </button>
        </div>
        
        <div id="messageContainer" class="message-container" style="display: none;">
            <!-- Los mensajes aparecerán aquí -->
        </div>
    </div>

    <!-- PÁGINA 2: PAYASOS (Oculta inicialmente) -->
    <div id="page2" class="clowns-container" style="display: none;">
        <h1 class="title-payasos">PAYASOS ESPERANDO</h1>
        
        <div class="clowns-grid">
            <!-- LILY -->
            <div class="clown-card" id="lilyCard">
                <div class="clown-image-container">
                    <img id="lilyImage" class="clown-image" src="lily.jpg" alt="Lily">
                </div>
                <div class="clown-info">
                    <h3>LILY</h3>
                    <p class="price">$100</p>
                    <p class="weight">Pesa: ???</p>
                </div>
                <div class="stars-container" id="lilyStars" style="display: none;">
                    <span class="star">★</span>
                    <span class="star">★</span>
                    <span class="star">★</span>
                    <span class="star">★</span>
                    <span class="star">★</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
